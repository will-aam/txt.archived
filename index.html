<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arquivo de Poesias</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>Minhas Poesias</h1>
        <p>Tem um pouco de mim aqui...</p>

        <div class="theme-switcher">
          <button
            class="theme-btn active"
            data-theme="default"
            title="Papel em Branco"
          >
            📄
          </button>
          <button
            class="theme-btn"
            data-theme="theme-sepia"
            title="Folha Antiga"
          >
            📜
          </button>
          <button class="theme-btn" data-theme="theme-night" title="Noite">
            🌙
          </button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="filtros-container">
        <p class="filtros-titulo">
          Filtrar por: <span id="tag-ativa">Todas as poesias</span>
        </p>

        <button id="btn-abrir-filtros" class="btn-mobile-filtro">
          Filtrar 🪄
        </button>

        <div id="filtros-overlay" class="filtros-overlay"></div>

        <div id="filtros-sheet" class="filtros-sheet">
          <div class="sheet-handle" id="fechar-sheet-handle"></div>
          <div class="sheet-content">
            <h3 class="sheet-title">Selecione uma categoria</h3>
            <div id="lista-filtros" class="tags-filtro"></div>
          </div>
        </div>
      </section>

      <section id="lista-poemas" class="poemas-grid"></section>
    </main>

    <aside id="leitor-lateral" class="leitor-lateral">
      <div class="leitor-conteudo container">
        <button
          id="fechar-leitor"
          class="fechar-btn"
          aria-label="Fechar leitura"
        >
          🔙 Voltar
        </button>
        <article id="leitor-poema"></article>
      </div>
    </aside>

    <footer class="site-footer container">
      <p>&copy; 2017/2024 - Will</p>
      <div class="social-links">
        <a
          href="https://github.com/will-aam"
          target="_blank"
          rel="noopener noreferrer"
          title="GitHub"
          class="social-icon"
        >
          <img
            src="https://skillicons.dev/icons?i=github"
            alt="GitHub"
            class="social-icon-img"
            height="24"
            width="24"
        /></a>
        <a
          href="https://instagram.com/will.aam"
          target="_blank"
          rel="noopener noreferrer"
          title="Instagram"
          class="social-icon"
        >
          <img
            src="https://skillicons.dev/icons?i=instagram"
            alt="Instagram"
            class="social-icon-img"
            height="24"
            width="24"
        /></a>
      </div>
    </footer>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/theme.js"></script>
  </body>
</html>
